<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Dashboard & Catalogue — Sam Taxi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #F5C842;
            --gold-dim: rgba(245, 200, 66, 0.15);
            --black: #0a0a0a;
            --dark: #111111;
            --card: #161616;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f0f0;
            --muted: #888;
            --blue: #3b82f6;
            --blue-dim: rgba(59, 130, 246, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--black);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Noise Texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: .5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 24px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 32px;
            color: white;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--gold);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--muted);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        /* --- STATS GRID --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-dim);
        }

        .stat-value {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 40px;
            font-weight: 800;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* --- CONTROLS --- */
        .search-area {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 60px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex;
            gap: 16px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 18px;
            /* Placeholder styling */
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .search-icon {
            color: var(--gold);
            font-size: 20px;
            display: flex;
            align-items: center;
        }

        .view-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--card);
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--gold);
            color: white;
        }

        .filter-btn.active {
            background: var(--gold);
            color: var(--black);
            border-color: var(--gold);
            font-weight: 700;
        }

        /* --- RESULTS --- */
        .results-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .page-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .page-card:hover {
            transform: scale(1.02);
            border-color: rgba(245, 200, 66, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .category-tag {
            align-self: flex-start;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-medical {
            background: var(--blue-dim);
            color: var(--blue);
        }

        .tag-aeroport {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .tag-prive {
            background: var(--gold-dim);
            color: var(--gold);
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: white;
            line-height: 1.3;
        }

        .page-desc {
            font-size: 13px;
            color: var(--muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .page-link {
            font-size: 12px;
            color: var(--gold);
            font-weight: 500;
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #loader {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            color: var(--gold);
            animation: pulse 2s infinite;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            color: var(--muted);
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .search-area {
                border-radius: 16px;
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">SAM<span>.</span>TAXI</div>
            <h1>SEO Machine Dashboard</h1>
            <p class="subtitle">Propulsez votre visibilité avec notre réseau de pages intelligentes et ultra-ciblées.
            </p>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="totalCount">...</span>
                    <span class="stat-label">Pages SEO Libérées</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">100%</span>
                    <span class="stat-label">Dynamique</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">PACA</span>
                    <span class="stat-label">Zone de Chasse</span>
                </div>
                <div class="stat-card" style="border-color: var(--blue-dim);">
                    <span class="stat-value" id="medicalCount" style="color: var(--blue);">...</span>
                    <span class="stat-label">Transports Médicaux</span>
                </div>
            </div>

            <div class="search-area">
                <div class="search-icon">🔍</div>
                <input type="text" id="searchInput" class="search-input"
                    placeholder="Rechercher une ville, un hôpital ou un service...">
            </div>

            <div class="view-controls">
                <button class="filter-btn active" data-cat="all">Toutes les pages</button>
                <button class="filter-btn" data-cat="medical">🏥 Médical (CPAM)</button>
                <button class="filter-btn" data-cat="prive">🚗 Services Privés</button>
                <button class="filter-btn" data-cat="aeroport">✈️ Aéroports / Gares</button>
            </div>
        </header>

        <main id="resultsGrid" class="results-section">
            <div id="loader">Chargement du moteur atomique...</div>
        </main>
    </div>

    <script>
        let allData = [];
        let filteredData = [];
        let currentFilter = 'all';
        const displayLimit = 200; // Limite pour garder la fluidité mais montrer assez de choix

        const grid = document.getElementById('resultsGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const totalDisplay = document.getElementById('totalCount');
        const medicalDisplay = document.getElementById('medicalCount');

        // Chargement du JSON maittre
        async function init() {
            try {
                const response = await fetch('seo-data-master.json');
                const data = await response.json();

                // Transformation en tableau pour recherche efficace
                allData = Object.keys(data).map(slug => {
                    const item = data[slug];

                    // Catégorisation intelligente
                    let cat = 'prive';
                    if (slug.includes('medical')) cat = 'medical';
                    else if (slug.includes('transfert') || slug.includes('aeroport') || slug.includes('gare')) cat = 'aeroport';

                    return {
                        slug,
                        cat,
                        title: item.title.replace(' — Sam Taxi Service', '').replace(' — Transport Conventionné CPAM', ''),
                        desc: item.metaDesc,
                        searchStr: `${item.title} ${slug} ${item.metaDesc}`.toLowerCase()
                    };
                });

                // Compteurs temps réel
                totalDisplay.textContent = allData.length.toLocaleString();
                medicalDisplay.textContent = allData.filter(d => d.cat === 'medical').length.toLocaleString();

                document.getElementById('loader').remove();
                applyFilters();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = "<span style='color:red'>Erreur de chargement. Le fichier seo-data-master.json est introuvable.</span>";
            }
        }

        function applyFilters() {
            const query = searchInput.value.toLowerCase().trim();

            filteredData = allData.filter(item => {
                const matchCat = currentFilter === 'all' || item.cat === currentFilter;
                const matchQuery = query === '' || item.searchStr.includes(query);
                return matchCat && matchQuery;
            });

            render();
        }

        function render() {
            grid.innerHTML = '';

            if (filteredData.length === 0) {
                grid.innerHTML = '<div class="no-results">Aucune page ne correspond à votre recherche.</div>';
                return;
            }

            const toShow = filteredData.slice(0, displayLimit);

            toShow.forEach(item => {
                const card = document.createElement('a');
                card.href = `index.html?p=${item.slug}`;
                card.target = "_blank";
                card.className = 'page-card';

                const catInfo = {
                    medical: { label: 'Médical (CPAM)', class: 'tag-medical' },
                    aeroport: { label: 'Liaison Hub', class: 'tag-aeroport' },
                    prive: { label: 'Service Privé', class: 'tag-prive' }
                };

                card.innerHTML = `
                    <div class="category-tag ${catInfo[item.cat].class}">${catInfo[item.cat].label}</div>
                    <div class="page-title">${item.title}</div>
                    <div class="page-desc">${item.desc}</div>
                    <div class="page-link">Ouvrir la page ↗</div>
                `;
                grid.appendChild(card);
            });

            if (filteredData.length > displayLimit) {
                const note = document.createElement('div');
                note.className = 'no-results';
                note.style.borderTop = '1px solid var(--border)';
                note.innerHTML = `Affichage limité aux <b>${displayLimit}</b> premiers résultats pour la performance. <br>Affinez votre recherche pour trouver une destination précise parmi les <b>${filteredData.length}</b> correspondances.`;
                grid.appendChild(note);
            }
        }

        // Listeners
        searchInput.addEventListener('input', applyFilters);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.cat;
                applyFilters();
            });
        });

        init();
    </script>
</body>

</html>
